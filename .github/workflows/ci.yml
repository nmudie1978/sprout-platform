name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      # Typecheck is currently noisy due to pre-existing TS errors in
      # test files and node_modules type mismatches. Running it as a
      # non-blocking step so it surfaces issues without failing the
      # build. Tighten to `run: npm run typecheck` once the baseline
      # is clean.
      - name: Typecheck (non-blocking)
        run: npm run typecheck || true

      - name: Test
        run: npm run test:run
